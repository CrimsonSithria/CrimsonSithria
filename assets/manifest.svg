<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 476" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" role="img" aria-label="fleet manifest — eight vessels">
  <style>
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
    .dot{animation:pulse 2.6s ease-in-out infinite}
    @keyframes seal{0%,100%{opacity:.85}50%{opacity:.45}}
    .seal{animation:seal 5s ease-in-out infinite}
    @keyframes sweep{from{transform:translateY(-10px)}to{transform:translateY(490px)}}
    .sweep{animation:sweep 10s linear infinite}
  </style>
  <rect x="1" y="1" width="938" height="474" rx="12" fill="#0a040d" stroke="#ff2a4d" stroke-opacity=".32"/>
  <clipPath id="panel"><rect x="1" y="1" width="938" height="474" rx="12"/></clipPath>
  <g clip-path="url(#panel)"><rect class="sweep" width="940" height="3" fill="#ff5c72" opacity=".05"/></g>

  <text x="36" y="42" font-size="15" letter-spacing="2" fill="#ff5c72" font-weight="bold">⟨ FLEET MANIFEST ⟩</text>
  <text x="904" y="42" font-size="12.5" letter-spacing="1.5" fill="#9a6b76" text-anchor="end">EIGHT VESSELS · ALL ACCOUNTED FOR</text>
  <line x1="24" y1="58" x2="916" y2="58" stroke="#ff2a4d" stroke-opacity=".18"/>

  <text x="62" y="73" font-size="10" letter-spacing="2" fill="#6e4a53">VESSEL</text>
  <text x="240" y="73" font-size="10" letter-spacing="2" fill="#6e4a53" text-anchor="middle">CLASS</text>
  <text x="340" y="73" font-size="10" letter-spacing="2" fill="#6e4a53">DIRECTIVE</text>
  <text x="904" y="73" font-size="10" letter-spacing="2" fill="#6e4a53" text-anchor="end">BAND</text>

  <!-- CRIMSON -->
  <circle class="dot" cx="44" cy="88" r="3.5" fill="#ff3b5c"/>
  <text x="62" y="93" font-size="15" letter-spacing="2" fill="#ffe4e8" font-weight="bold">CRIMSON</text>
  <rect x="196" y="76" width="88" height="20" rx="10" fill="none" stroke="#ff2a4d" stroke-opacity=".45"/>
  <text x="240" y="90" font-size="11" letter-spacing="1" fill="#d08794" text-anchor="middle">factory</text>
  <text x="340" y="92" font-size="13" fill="#9a6b76">plans in, pull requests out — software that builds software</text>
  <text class="seal" x="904" y="92" font-size="11" letter-spacing="2" fill="#ff5c72" text-anchor="end">▓ SEALED</text>

  <!-- OSIRIS -->
  <circle class="dot" cx="44" cy="136" r="3.5" fill="#ff3b5c" style="animation-delay:-.4s"/>
  <text x="62" y="141" font-size="15" letter-spacing="2" fill="#ffe4e8" font-weight="bold">OSIRIS</text>
  <rect x="196" y="124" width="120" height="20" rx="10" fill="none" stroke="#ff2a4d" stroke-opacity=".45"/>
  <text x="256" y="138" font-size="11" letter-spacing="1" fill="#d08794" text-anchor="middle">nervous system</text>
  <text x="340" y="140" font-size="13" fill="#9a6b76">persistent memory, identity, the operator's shadow</text>
  <text class="seal" x="904" y="140" font-size="11" letter-spacing="2" fill="#ff5c72" text-anchor="end" style="animation-delay:-1s">▓ SEALED</text>

  <!-- SENTINEL -->
  <circle class="dot" cx="44" cy="184" r="3.5" fill="#ff3b5c" style="animation-delay:-.8s"/>
  <text x="62" y="189" font-size="15" letter-spacing="2" fill="#ffe4e8" font-weight="bold">SENTINEL</text>
  <rect x="196" y="172" width="96" height="20" rx="10" fill="none" stroke="#ff2a4d" stroke-opacity=".45"/>
  <text x="244" y="186" font-size="11" letter-spacing="1" fill="#d08794" text-anchor="middle">overwatch</text>
  <text x="340" y="188" font-size="13" fill="#9a6b76">always-on overlay agent, watching from orbit</text>
  <text class="seal" x="904" y="188" font-size="11" letter-spacing="2" fill="#ff5c72" text-anchor="end" style="animation-delay:-2s">▓ SEALED</text>

  <!-- MAGI -->
  <circle class="dot" cx="44" cy="232" r="3.5" fill="#ff3b5c" style="animation-delay:-1.2s"/>
  <text x="62" y="237" font-size="15" letter-spacing="2" fill="#ffe4e8" font-weight="bold">MAGI</text>
  <rect x="196" y="220" width="100" height="20" rx="10" fill="none" stroke="#ff2a4d" stroke-opacity=".45"/>
  <text x="246" y="234" font-size="11" letter-spacing="1" fill="#d08794" text-anchor="middle">laboratory</text>
  <text x="340" y="236" font-size="13" fill="#9a6b76">model internals — probing, fine-tuning, inference</text>
  <text class="seal" x="904" y="236" font-size="11" letter-spacing="2" fill="#ff5c72" text-anchor="end" style="animation-delay:-3s">▓ SEALED</text>

  <!-- 2501 -->
  <circle class="dot" cx="44" cy="280" r="3.5" fill="#ff3b5c" style="animation-delay:-1.4s"/>
  <text x="62" y="285" font-size="15" letter-spacing="2" fill="#ffe4e8" font-weight="bold">2501</text>
  <rect x="196" y="268" width="88" height="20" rx="10" fill="none" stroke="#ff2a4d" stroke-opacity=".45"/>
  <text x="240" y="282" font-size="11" letter-spacing="1" fill="#d08794" text-anchor="middle">crucible</text>
  <text x="340" y="284" font-size="13" fill="#9a6b76">outer loop — the meta-agent that hill-climbs the others</text>
  <text class="seal" x="904" y="284" font-size="11" letter-spacing="2" fill="#ff5c72" text-anchor="end" style="animation-delay:-.5s">▓ SEALED</text>

  <!-- T3MP3ST -->
  <circle class="dot" cx="44" cy="328" r="3.5" fill="#ff2038" style="animation-delay:-1.6s"/>
  <text x="62" y="333" font-size="15" letter-spacing="2" fill="#ff8fa0" font-weight="bold">T3MP3ST</text>
  <rect x="196" y="316" width="70" height="20" rx="10" fill="none" stroke="#ff2038" stroke-opacity=".6"/>
  <text x="231" y="330" font-size="11" letter-spacing="1" fill="#ff6b81" text-anchor="middle">storm</text>
  <text x="340" y="332" font-size="13" fill="#9a6b76">offensive arm — adversarial security, multi-agent red team</text>
  <text class="seal" x="904" y="332" font-size="11" letter-spacing="2" fill="#ff5c72" text-anchor="end" style="animation-delay:-4s">▓ SEALED</text>

  <!-- W4RD3N -->
  <circle class="dot" cx="44" cy="376" r="3.5" fill="#6ec3e8" style="animation-delay:-2s"/>
  <text x="62" y="381" font-size="15" letter-spacing="2" fill="#c8e6f5" font-weight="bold">W4RD3N</text>
  <rect x="196" y="364" width="76" height="20" rx="10" fill="none" stroke="#6ec3e8" stroke-opacity=".55"/>
  <text x="234" y="378" font-size="11" letter-spacing="1" fill="#8fc9e3" text-anchor="middle">harbor</text>
  <text x="340" y="380" font-size="13" fill="#9a6b76">defensive fleet — SOC lab, detection &amp; response, the watch on the walls</text>
  <text class="seal" x="904" y="380" font-size="11" letter-spacing="2" fill="#6ec3e8" text-anchor="end" style="animation-delay:-2.5s">▓ SEALED</text>

  <!-- FLEETBAR -->
  <circle class="dot" cx="44" cy="424" r="3.5" fill="#ff3b5c" style="animation-delay:-2.4s"/>
  <text x="62" y="429" font-size="15" letter-spacing="2" fill="#ffe4e8" font-weight="bold">FLEETBAR</text>
  <rect x="196" y="412" width="130" height="20" rx="10" fill="none" stroke="#ff2a4d" stroke-opacity=".45"/>
  <text x="261" y="426" font-size="11" letter-spacing="1" fill="#d08794" text-anchor="middle">instrumentation</text>
  <text x="340" y="428" font-size="13" fill="#9a6b76">vitals of the fleet, one glance</text>
  <text class="seal" x="904" y="428" font-size="11" letter-spacing="2" fill="#ff5c72" text-anchor="end" style="animation-delay:-1.5s">▓ SEALED</text>

  <line x1="24" y1="446" x2="916" y2="446" stroke="#ff2a4d" stroke-opacity=".18"/>
  <text x="470" y="464" font-size="11.5" fill="#6e4a53" text-anchor="middle">sealed vessels surface when they are ready · the telemetry counts their traffic either way</text>
</svg>
