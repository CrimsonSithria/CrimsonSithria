<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" role="img" aria-label="crimsonsithria — the sky that holds the dawn">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff8f6"/>
      <stop offset=".6" stop-color="#ffeae3"/>
      <stop offset="1" stop-color="#ffd2c5"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f9e6e1"/>
      <stop offset="1" stop-color="#f2d5cf"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#ff3b5c" stop-opacity=".38"/>
      <stop offset=".5" stop-color="#ff3b5c" stop-opacity=".14"/>
      <stop offset="1" stop-color="#ff3b5c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun" cx=".5" cy=".4" r=".75">
      <stop offset="0" stop-color="#ff6d84"/>
      <stop offset=".6" stop-color="#e82547"/>
      <stop offset="1" stop-color="#c40f33"/>
    </radialGradient>
    <clipPath id="typeclip"><rect x="64" y="140" width="0" height="22">
      <animate attributeName="width" calcMode="discrete" fill="freeze" begin="1.2s" dur="2.8s"
        values="0;24;47;71;95;118;142;166;190;213;237;261;284;308;330"/>
    </rect></clipPath>
  </defs>
  <style>
    @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
    .glow{animation:pulse 7s ease-in-out infinite}
    @keyframes tw{0%,100%{opacity:.25}50%{opacity:.7}}
    .o{fill:#c98793;animation:tw 6s ease-in-out infinite}
  </style>

  <rect width="1000" height="340" fill="url(#sky)"/>

  <!-- the constellation lingers, faint in daylight -->
  <g opacity=".55">
    <polyline points="702,140 716,140 712,126 704,104 708,84 722,70 740,65 758,70 772,84 776,104 768,126 764,140 778,140"
      fill="none" stroke="#d8a3ac" stroke-width=".7" opacity=".4"/>
    <line x1="722" y1="42" x2="758" y2="42" stroke="#d8a3ac" stroke-width=".7" opacity=".5"/>
    <circle class="o" cx="716" cy="140" r="1.5" style="animation-delay:-1s"/>
    <circle class="o" cx="704" cy="104" r="1.4" style="animation-delay:-2.5s"/>
    <circle class="o" cx="722" cy="70"  r="1.5" style="animation-delay:-4s"/>
    <circle class="o" cx="740" cy="65"  r="1.7" style="animation-delay:-.7s"/>
    <circle class="o" cx="758" cy="70"  r="1.5" style="animation-delay:-3.2s"/>
    <circle class="o" cx="776" cy="104" r="1.4" style="animation-delay:-1.8s"/>
    <circle class="o" cx="764" cy="140" r="1.5" style="animation-delay:-5s"/>
    <circle class="o" cx="722" cy="42"  r="1.6" style="animation-delay:-2s"/>
    <circle class="o" cx="740" cy="42"  r="1.4" style="animation-delay:-3.8s"/>
    <circle class="o" cx="758" cy="42"  r="1.6" style="animation-delay:-.3s"/>
  </g>

  <!-- the dawn, risen -->
  <circle class="glow" cx="270" cy="192" r="150" fill="url(#glow)"/>
  <circle cx="270" cy="192" r="48" fill="url(#sun)"/>

  <!-- the horizon -->
  <rect y="250" width="1000" height="90" fill="url(#ground)"/>
  <rect y="249" width="1000" height="1.5" fill="#e05a6d" opacity=".55"/>
  <line x1="0" y1="264" x2="1000" y2="264" stroke="#d8848f" opacity=".25"/>
  <line x1="0" y1="282" x2="1000" y2="282" stroke="#d8848f" opacity=".2"/>
  <line x1="0" y1="305" x2="1000" y2="305" stroke="#d8848f" opacity=".15"/>
  <line x1="0" y1="330" x2="1000" y2="330" stroke="#d8848f" opacity=".1"/>

  <text x="64" y="118" font-size="34" letter-spacing="7" fill="#43101c">crimsonsithria</text>
  <g clip-path="url(#typeclip)">
    <text x="64" y="157" font-size="14" letter-spacing="3" fill="#8f4b58">the sky that holds the dawn</text>
  </g>
</svg>
